<!DOCTYPE html>

    <style>
        body {
            background: #222;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        * {
            box-sizing: border-box;
        }

        .board {
            width: 1250px;
        }

        .top-section {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .half-board {
            flex: 1;
        }

        .sidebar {
            width: 220px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-panel {
            background: #444;
            padding: 10px;
            border-radius: 10px;
        }

        .round-row {
            display: flex;
            gap: 6px;
        }

        .round-box {
            width: 40px;
            height: 40px;
            margin: 3px;
            background: white;
            color: black;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .circle-box {
            width: 40px;
            height: 40px;
            margin: 3px;
            background: white;
            color: black;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }

        .circle-box:disabled {
            background: #e1e0e0;
            cursor: not-allowed;
        }

        .round-box.active-round {
            background: #2e7d4d;
            color: white;
        }

        .board-row {
            margin: 12px 0;
            padding: 10px;
            border-radius: 10px;
        }

        .square-row {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
        }

        .grid {
            display: flex;
            flex-direction: column;
        }

        .white-square {
            width: 40px;
            height: 40px;
            margin: 3px;
            background: white;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            color: black;
        }

        .white-square:disabled {
            background: #bbb;
            cursor: not-allowed;
        }

        .score-box {
            width: 40px;
            height: 40px;
            margin: 3px;
            background: #ffffff33;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .board-info {
            width: 40px;
            height: 40px;
            margin: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
        }

        .player-info {

            height: 40px;
            margin: 3px;
            display: flex;
            align-items: left;
            justify-content: left;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
        }

        .arrow-square {
            width: 10px;
            height: 40px;
            margin: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
        }

        .arrow {
            font-size: 18px;
        }

        #statusBar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;

            background: #333;
            color: white;

            padding: 10px;
            text-align: center;

            font-size: 16px;

        /* bonus colors */

            background: #388bdf;
        }

        .bonus-yellow {
            background: #fcc83a;
            color: black;
        }

        }

        }

</head>

    <script>
        function diceToUnicode(value) {
            const map = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            return map[value];
        }

        let socket = null;

        function connectWebSocket() {
            const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
            socket = new WebSocket(protocol + window.location.host + "/ws");

            socket.onopen = () => {
                console.log("WebSocket connected");
                playerJoined();

                document.querySelectorAll(".white-square").forEach(s => {
                    s.disabled = true;
                });
            };

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === "diceRolled") {
                    updateDice(msg.dice);
                }

                if (msg.type === "updateBoard") {
                    updateBoard(msg.state);
                }

                if (msg.type === "playerJoined") {
                    updatePlayers(msg);
                    if (msg.startGame == "true") {
                        startGame();
                    }
                }
            };

            socket.onclose = () => {
                console.log("WebSocket disconnected");
                playerLeft();
            };

            socket.onerror = (err) => {
                console.error("WebSocket error:", err);
            };
        }

        connectWebSocket();

        document.querySelectorAll(".white-square").forEach(square => {
            square.addEventListener("click", () => {
                if (square.disabled) return;

                const board = square.dataset.board;
                const index = square.dataset.index;

                playMove(board, index);
            });
        });

        async function playMove(board, index) {
            const response = await fetch("/playMove", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    board: board,
                    index: index
                })
            });

            const state = await response.json();
            updateBoard(state);
        }

        async function playerJoined() {
            const response = await fetch("/playerJoined", { method: "POST" });

            if (!response.ok) {
                alert("Failed to join the player.");
            }
        }

        async function playerLeft() {
            const response = await fetch("/playerLeft", { method: "POST" });

            if (!response.ok) {
                alert("Failed to delete a disconnected player.");
            }
        }

        document.getElementById("rollButton").onclick = async () => {
            const response = await fetch("/rollDice", { method: "POST" });

            if (!response.ok) {
                alert("Failed to roll dice.");
            }
        };

        function updateDice(data) {
            for (let i = 0; i < 6; i++) {
                const el = document.getElementById("dice" + (i + 1));

                el.innerText = diceToUnicode(data[i].value);

                el.classList.remove("white", "blue", "yellow", "green", "orange", "purple");
                el.classList.add(data[i].color);
            }
        }

        function updatePlayers(data) {
            const numberOfPlayers = data.numberOfPlayers;
            for (let i = 0; i < numberOfPlayers; i++) {
                const el = document.getElementById("player" + (i + 1));
                el.innerText = data.players[i].name;
            }

            if (numberOfPlayers < 4) {
                updateStatus("Waiting for " + (4 - numberOfPlayers) + " more players...");
            }
            else {
                updateStatus("Starting the game.")
            }
        }

        function updateStatus(message) {
            const status = document.getElementById("statusBar");
            status.innerText = message;
        }

        async function startGame() {
            const response = await fetch("/updateBoard", { method: "POST" });

            if (!response.ok) {
                alert("Failed to start the game.");
            }
        }

        function updatePlayableSquares(playable) {
            document.querySelectorAll(".white-square").forEach(s => {
                s.disabled = true;
            });

            playable.forEach(p => {
                const selector = `.white-square[data-board="${p.board}"][data-index="${p.index}"]`;
                const el = document.querySelector(selector);
                if (el) el.disabled = false;
            });
        }

        function updateBoard(state) {
            

            const elements = document.querySelectorAll('.white-square[data-board="yellow"]');
            console.log(elements)
            elements.forEach(element => {
                const index = parseInt(element.dataset.index);
                console.log(index + " " + state.yellowBoard[index])

                if (state.yellowBoard[index] === "T") {
                    element.classList.add("disabled");
                    element.style.pointerEvents = "none";
                    element.style.opacity = "0.5";
                } else {
                    element.classList.remove("disabled");
                    element.style.pointerEvents = "auto";
                    element.style.opacity = "1";
                }
            });
        }

        function setRollEnabled(enabled) {
            document.getElementById("rollButton").disabled = !enabled;
        }
    </script>

</body>

</html>
