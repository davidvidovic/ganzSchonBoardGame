<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roll Dices</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 50px;
    background-color: #808080; /* grey background */
}

button {
    padding: 12px 30px;
    font-size: 20px;
    cursor: pointer;
}

#diceContainer {
    margin-top: 40px;
}

/* base dice style */
.dice {
    display: inline-block;
    font-size: 70px;
    margin: 12px;
    width: 90px;
    height: 90px;
    line-height: 90px;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
}

.dice:hover {
    transform: scale(1.1);
}

/* dice colors */
.blue {
    background: #1e90ff;
    color: white;
}

.yellow {
    background: #ffd700;
    color: black;
}

.orange {
    background: #ff8c00;
    color: white;
}

.white {
    background: white;
    color: black;
}

.green {
    background: #2ecc71;
    color: white;
}

.purple {
    background: #8e44ad;
    color: white;
}
</style>
</head>

<body>

<h1>Ganz Schön Clever Dice Roller</h1>

<button onclick="rollDice()">Roll</button>

<div id="diceContainer"></div>

<script>
function diceToUnicode(value) {
    const map = ["","⚀","⚁","⚂","⚃","⚄","⚅"];
    return map[value];
}

// Handle dice clicks
function onDiceClick(color, value) {
    console.log("Dice clicked:", color, value);
    // TODO: Add your game logic here
    alert(`You clicked the ${color} dice with value ${value}`);
}

async function rollDice() {
    const container = document.getElementById("diceContainer");
    container.innerHTML = ""; // clear old dice

    try {
        const response = await fetch('/rollDice', { method: 'POST' });
        const data = await response.json();

        data.forEach(dice => {
            const diceEl = document.createElement("div");
            diceEl.className = "dice " + dice.color; // set color
            diceEl.innerHTML = diceToUnicode(dice.value); // set value

            // Make dice clickable
            diceEl.onclick = () => onDiceClick(dice.color, dice.value);

            container.appendChild(diceEl);
        });

    } catch (err) {
        container.innerText = "Error contacting server.";
        console.error(err);
    }
}
</script>

</body>
</html>
